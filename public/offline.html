<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#00c471" />
  <title>오프라인 - SR마트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f8fffe;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: #1a1a1a;
    }
    .icon {
      width: 80px; height: 80px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 40px; height: 40px; }
    h1 { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 10px; }
    p  { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #00c471, #00a85e);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,196,113,0.3);
      font-family: inherit;
    }
    .logo {
      font-size: 20px; font-weight: 800; color: #00c471;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="logo">에스알마트</div>
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#00c471" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>
  <h1>인터넷 연결이 없어요</h1>
  <p>네트워크 연결을 확인하고<br>다시 시도해주세요.</p>
  <button class="btn" onclick="location.reload()">다시 시도</button>
</body>
</html>
